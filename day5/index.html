<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 감정일기 - 오늘하루는 어땟나용?</title>
    <meta name="description" content="당신의 하루를 기록하고 AI에게 감정 분석을 받아보세요.">
    <!-- Pretendard Font -->
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --secondary: #10b981;
            --bg-dark: #0f172a;
            --surface: #1e293b;
            --surface-hover: #2dd4bf;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --ai-bg: #475569;
            /* 회색 배경 */
        }

        body {
            margin: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            background-image: radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(45, 212, 191, 0.1), transparent 25%);
        }

        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 600px;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-2px);
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #c4b5fd, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 15px;
            margin: 0;
            font-weight: 400;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 32px;
        }

        textarea {
            width: 100%;
            height: 160px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            color: var(--text-main);
            font-size: 16px;
            line-height: 1.6;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15), inset 0 2px 4px rgba(0, 0, 0, 0.2);
            background: rgba(15, 23, 42, 0.95);
        }

        textarea::placeholder {
            color: #64748b;
        }

        .button-group {
            display: flex;
            gap: 16px;
        }

        .btn {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-voice {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        /* 음성 아이콘 SVG */
        .btn-voice::before {
            content: '';
            width: 20px;
            height: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="%23f8fafc"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>');
            background-size: cover;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .btn-voice:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: #475569;
        }

        .btn-voice:hover::before {
            opacity: 1;
        }

        .btn-analyze {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            box-shadow: 0 4px 15px -3px rgba(139, 92, 246, 0.4), 0 4px 6px -4px rgba(139, 92, 246, 0.2);
            position: relative;
            overflow: hidden;
        }

        /* 분석 아이콘 SVG */
        .btn-analyze::before {
            content: '';
            width: 20px;
            height: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="white"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>');
            background-size: cover;
        }

        .btn-analyze::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: translateX(-100%);
        }

        .btn-analyze:hover {
            box-shadow: 0 8px 25px -5px rgba(139, 92, 246, 0.5), 0 8px 10px -6px rgba(139, 92, 246, 0.3);
            filter: brightness(1.05);
        }

        .btn-analyze:hover::after {
            animation: shine 1.5s ease-in-out infinite;
        }

        @keyframes shine {
            100% {
                transform: translateX(100%);
            }
        }

        .response-section {
            background: rgba(15, 23, 42, 0.4);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .response-section h2 {
            font-size: 18px;
            margin: 0 0 16px 0;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .response-section h2::before {
            content: '✨';
            font-size: 18px;
        }

        .ai-response-box {
            background-color: var(--ai-bg);
            padding: 24px;
            border-radius: 14px;
            color: var(--text-main);
            /* 가독성을 위해 흰색에 가깝게 유지 */
            font-size: 15.5px;
            line-height: 1.7;
            min-height: 80px;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.05);
            word-break: keep-all;
            opacity: 0.9;
        }

        /* 모바일 대응 */
        @media (max-width: 480px) {
            .button-group {
                flex-direction: column;
            }

            .container {
                padding: 24px;
            }

            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>오늘하루는 어땟나용?</h1>
            <p>다양한 감정이 담긴 오늘 하루 이야기를 들려주세요.</p>
        </header>

        <main>
            <div class="input-section">
                <textarea id="diaryInput" placeholder="오늘 있었던 일이나 지금의 감정을 자유롭게 적어보세요..."></textarea>
                <div class="button-group">
                    <button class="btn btn-voice">음성으로 입력하기</button>
                    <button class="btn btn-analyze">분석 요청하기</button>
                </div>
            </div>
        </main>

        <footer>
            <div class="response-section">
                <h2>ai의 답변</h2>
                <div class="ai-response-box">
                    여기에 ai의 답변이 표시됩니다.
                </div>
            </div>
        </footer>
    </div>
</body>

</html>
