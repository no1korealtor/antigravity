<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘도 힘내세요!</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@400;700;900&display=swap"
        rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <header class="app-header">
        <div class="header-content">
            <h1>나의 첫 서비스</h1>
            <nav class="nav-menu">
                <a href="#">소개</a>
                <a href="#">기능</a>
                <a href="#">문의</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <div class="glass-panel">
            <h2 class="idea-text" id="mainText">오늘도 힘내세요!</h2>
            <button class="next-btn" id="nextBtn">다음 문장 보기</button>
        </div>
    </main>
    <footer class="app-footer">
        <p>2025 My Service</p>
    </footer>
    <script>
        const sentences = [
            "오늘도 힘내세요!",
            "오늘도 해냈어요!",
            "조금씩 나아지고 있어요.",
            "이대로 계속 가봅시다."
        ];

        let currentIndex = 0;
        const mainText = document.getElementById('mainText');
        const nextBtn = document.getElementById('nextBtn');

        nextBtn.addEventListener('click', () => {
            // Update index to the next sentence
            currentIndex = (currentIndex + 1) % sentences.length;

            // Add a small fade effect (optional, handled via CSS if needed, but we'll just swap text for now)
            mainText.style.opacity = 0;

            setTimeout(() => {
                mainText.textContent = sentences[currentIndex];

                const sentence = sentences[currentIndex];

                nextBtn.classList.remove('yellow', 'green');

                if (sentence === "오늘도 해냈어요!") {
                    nextBtn.classList.add('yellow');
                } else if (sentence === "이대로 계속 가봅시다.") {
                    nextBtn.classList.add('green');
                }

                mainText.style.transition = 'opacity 0.3s ease';
                mainText.style.opacity = 1;
            }, 150);
        });
    </script>
</body>

</html>
