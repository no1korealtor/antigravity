<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘도 힘내세요!</title>
    <!-- Pretendard Font for best Korean readability -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <!-- Main CSS -->
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <header class="app-header">
        <div class="header-content">
            <h1>나의 첫 서비스</h1>
            <nav class="nav-menu">
                <a href="#">소개</a>
                <a href="#">기능</a>
                <a href="#">문의</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <section class="feature-section">
            <div class="section-title">핵심 기능 소개</div>
            <div class="glass-panel">
                <h2 class="idea-text" id="mainText">오늘도 힘내세요!</h2>
                <button class="next-btn" id="nextBtn">다음 문장 보기</button>
            </div>
        </section>

        <section class="review-section">
            <div class="section-title">사용자 후기</div>
            <div class="review-cards">
                <div class="review-card glass-panel-sm">
                    <img src="assets/profile1.png" alt="사용자 1" class="profile-img">
                    <div class="review-content">
                        <h4>김지훈</h4>
                        <p>"이 서비스를 처음 사용해봤는데 정말 놀랍습니다! 깔끔한 디자인과 부드러운 애니메이션에 반했습니다."</p>
                    </div>
                </div>
                <div class="review-card glass-panel-sm">
                    <img src="assets/profile2.png" alt="사용자 2" class="profile-img">
                    <div class="review-content">
                        <h4>이수진</h4>
                        <p>"힘들 때마다 문장을 보며 위로를 받고 있어요. 동적으로 변하는 버튼 색상도 아주 매력적입니다."</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer class="app-footer">
        <p>2025 My Service</p>
    </footer>
    <script>
        const sentences = [
            "오늘도 힘내세요!",
            "오늘도 해냈어요!",
            "조금씩 나아지고 있어요.",
            "이대로 계속 가봅시다."
        ];

        let currentIndex = 0;
        const mainText = document.getElementById('mainText');
        const nextBtn = document.getElementById('nextBtn');

        nextBtn.addEventListener('click', () => {
            // Update index to the next sentence
            currentIndex = (currentIndex + 1) % sentences.length;

            // Add a small fade effect (optional, handled via CSS if needed, but we'll just swap text for now)
            mainText.style.opacity = 0;

            setTimeout(() => {
                mainText.textContent = sentences[currentIndex];

                const sentence = sentences[currentIndex];

                nextBtn.classList.remove('yellow', 'green');

                if (sentence === "오늘도 해냈어요!") {
                    nextBtn.classList.add('yellow');
                } else if (sentence === "이대로 계속 가봅시다.") {
                    nextBtn.classList.add('green');
                }

                mainText.style.transition = 'opacity 0.3s ease';
                mainText.style.opacity = 1;
            }, 150);
        });
    </script>
</body>

</html>
